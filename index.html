<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Memo - Premium Note App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Pretendard:wght@400;600&display=swap" rel="stylesheet">

    <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="app-container">
        <header>
            <div class="header-top">
                <h1>Instant Memo</h1>
                <button id="themeToggle" class="theme-toggle-btn" title="Toggle Light/Dark Theme"></button>
            </div>
            <p class="subtitle">Quick thoughts, beautifully organized.</p>
            <div id="syncStatus" class="sync-status" data-mode="syncing">Starting...</div>
        </header>

        <section class="date-navigator">
            <button id="prevDate" class="nav-btn" aria-label="Previous date">&lsaquo;</button>
            <div id="currentDateDisplay" class="current-date" role="button" tabindex="0" aria-label="Select date">
                <div id="dayText" class="day-of-week">DAY</div>
                <div class="date-row">
                    <span id="dateText">2026. 02. 25</span>
                    <svg class="calendar-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                </div>
                <input type="date" id="datePicker" class="hidden-picker" tabindex="-1" aria-hidden="true">
            </div>
            <button id="nextDate" class="nav-btn" aria-label="Next date">&rsaquo;</button>
            <button id="viewArchiveBtn" class="nav-btn sort-nav-btn" title="View Archive" aria-label="View archive">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 8v13H3V8"></path>
                    <polyline points="1 3 23 3 23 8 1 8 1 3"></polyline>
                    <path d="M10 12h4"></path>
                </svg>
            </button>
            <button id="sortBtn" class="nav-btn sort-nav-btn" title="Sort listing (Newest top, Completed bottom)" aria-label="Sort memos">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 2v6h-6"></path>
                    <path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path>
                    <path d="M3 22v-6h6"></path>
                    <path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path>
                </svg>
            </button>
        </section>

        <section class="input-section">
            <div class="input-wrapper">
                <input type="text" id="memoInput" placeholder="Type a new memo and press Enter" autocomplete="off">
                <button id="addBtn" aria-label="Add memo">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
            </div>
        </section>

        <section class="list-section">
            <ul id="memoList"></ul>
        </section>

        <footer>
            <div class="stats">
                <span id="activeCount">0</span> open items
            </div>
            <button id="clearCompleted" class="text-btn">Clear completed</button>
        </footer>
    </main>

    <div id="archiveInputModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="archiveInputTitle">
        <div class="modal-content">
            <h2 id="archiveInputTitle">Archive Memo</h2>
            <p id="archiveTaskText" class="task-preview"></p>
            <label class="sr-only" for="archiveMemoInput">Archive note</label>
            <textarea id="archiveMemoInput" placeholder="Add an optional memo before archiving..."></textarea>
            <div class="modal-actions">
                <button id="cancelArchiveBtn" class="modal-btn cancel">Cancel</button>
                <button id="confirmArchiveBtn" class="modal-btn confirm">Archive</button>
            </div>
        </div>
    </div>

    <div id="archiveViewModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="archiveViewTitle">
        <div class="modal-content archive-view">
            <div class="archive-header">
                <h2 id="archiveViewTitle">Archived Items</h2>
                <button id="closeArchiveViewBtn" class="close-btn" aria-label="Close archive view">&times;</button>
            </div>
            <ul id="archiveList" class="archive-list"></ul>
        </div>
    </div>

    <div id="alarmModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="alarmTitle">
        <div class="modal-content">
            <h2 id="alarmTitle">Set Alarm</h2>
            <p id="alarmTaskText" class="task-preview"></p>
            <div class="alarm-settings">
                <div class="setting-group">
                    <label for="alarmDateTime">Date &amp; Time</label>
                    <input type="datetime-local" id="alarmDateTime">
                </div>
                <div class="setting-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="alarmRepeat"> Repeat
                    </label>
                </div>
                <div id="repeatOptions" class="hidden">
                    <div class="setting-group">
                        <label for="repeatInterval">Interval (minutes)</label>
                        <input type="number" id="repeatInterval" min="1" value="60">
                    </div>
                    <div class="setting-group">
                        <label for="repeatUntil">Repeat Until</label>
                        <input type="datetime-local" id="repeatUntil">
                    </div>
                </div>
            </div>
            <div class="modal-actions">
                <button id="cancelAlarmBtn" class="modal-btn cancel">Cancel</button>
                <button id="removeAlarmBtn" class="modal-btn delete-style hidden">Remove Alarm</button>
                <button id="saveAlarmBtn" class="modal-btn confirm">Save Alarm</button>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="editTitle">
        <div class="modal-content">
            <h2 id="editTitle">Edit Memo</h2>
            <div class="input-wrapper" style="margin-bottom: 20px;">
                <label class="sr-only" for="editMemoInput">Edit memo text</label>
                <input type="text" id="editMemoInput" placeholder="Edit your memo..." style="width: 100%;">
            </div>
            <div class="modal-actions">
                <button id="cancelEditBtn" class="modal-btn cancel">Cancel</button>
                <button id="confirmEditBtn" class="modal-btn confirm">Save Changes</button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script defer src="app.js"></script>
</body>

</html>
